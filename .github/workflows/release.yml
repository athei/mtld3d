name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  draft-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Tag pushes are not tied to a branch; only draft releases for tags
      # whose commit is reachable from main.
      - name: Verify the tag points into main
        run: |
          git fetch origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main

      # Artifacts (mtld3d.tar.xz from `make bundle`) are uploaded manually
      # onto the draft before publishing.
      - name: Draft the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --draft \
            --verify-tag \
            --generate-notes \
            --title "$GITHUB_REF_NAME"
