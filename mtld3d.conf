# mtld3d configuration file
#
# Drop this file next to the game's .exe (the directory `std::env::current_exe()`
# resolves to inside Wine â€” same place as the EXE itself). mtld3d reads it
# once at `Direct3DCreate9` time; any later edits require restarting the game.
#
# Lines starting with `#` are comments. Each option below is spelled out with
# its default value and left commented out, so the file is a no-op until you
# uncomment a line.
#
# Format:  key = value
#   Booleans: `true` / `false` (case-insensitive)
#   Strings:  bare or `"quoted"` (quote when the value has trailing whitespace)
#   Lists:    comma-separated, see `debug.skipShaders` for hex parsing
#
# Unknown keys, malformed lines, and unparseable values fire a one-shot
# `log_once_warn!` and otherwise no-op (parsing continues; the default
# value is preserved). Use `RUST_LOG=mtld3d::d3d9=info` to see the
# resolved option set on startup.
#
# Every key below is also overridable at launch via the `MTLD3D_CONFIG`
# env var: a semicolon-separated list of `key=value` entries using the
# same syntax as this file. Env entries are merged on top of the file
# (env wins on conflict); unset keys keep their file (or default) value.
# Example:
#   MTLD3D_CONFIG="color.hdr.enable=true;cursor.scale=2"


##########
# Color  #
##########

# Layer colorspace tagging policy.
#
# `passthrough` (the default) tags the `CAMetalLayer` with the
# display's own `CGColorSpace`. macOS does an identity round-trip,
# so D3D9's untagged RGB values land at the panel's native primaries
# â€” maximum vibrance per display, but on a wide-gamut panel the same
# colours render with more saturation than the game's designer
# intended.
#
# `accurate` overrides that with the sRGB family
# (`kCGColorSpaceSRGB` for SDR, `kCGColorSpaceExtendedLinearSRGB`
# for HDR). D3D9 art was overwhelmingly authored against sRGB
# primaries, so tagging the layer as sRGB asks the compositor for
# colour-managed conversion to the panel â€” designer-intended hues
# instead of a gamut stretch.
#
# Default: passthrough
# Supported values: passthrough, accurate

# color.space = passthrough

# Enable the HDR present pipeline on EDR-capable displays.
#
# When `true` and the attached `NSScreen` reports EDR headroom, mtld3d
# upgrades the `CAMetalLayer` to `extendedDynamicRange` and routes
# present through the BT.2446-A inverse-tone-mapping shader (encoded
# in ICtCp). The layer's colorspace tag follows `color.space` above
# (extended-linear variant on the HDR side either way: float surfaces
# require a linear tag). When `false` (the default), the present
# pipeline always uses the SDR blit regardless of display capability.
# Users on non-HDR displays see no difference either way.
#
# Default: false
# Supported values: true, false

# color.hdr.enable = false


###########
# Cursor  #
###########

# Hardware-cursor (`HCURSOR`) bitmap enlargement factor.
#
# Wine's HCURSOR path doesn't participate in macOS's automatic retina
# upscale, so on a 2Ă— display the default cursor sprite is half-sized.
# `auto` (the default) reads `NSWindow.backingScaleFactor`, rounds, and
# clamps to `[1, 8]` â€” the cursor matches the panel. Set a positive
# integer to override (e.g. `2` for a uniform 2Ă— cursor, useful when
# `backingScaleFactor` reports 1 on a hi-DPI external panel). Values
# above 8 clamp to 8 at use time.
#
# Default: auto
# Supported values: auto, 1, 2, 3, â€¦

# cursor.scale = auto

##################
# Shader cache  #
##################

# Use the persistent on-disk shader cache (`mtld3d_shaders.bin` next to
# the game's .exe).
#
# When `true` (the default), mtld3d warms its in-memory shader cache from
# disk at startup and appends a record per cache-miss compile so the
# next run avoids re-compiling. Disable with `false` if you're
# bisecting a shader-emitter change and want to force every shader to
# re-compile from bytecode on each run (the cache key is content-hashed
# bytecode, so a stale entry written by a buggy emitter would otherwise
# pin you to the bug across runs).
#
# Default: true
# Supported values: true, false

# shaderCache.enable = true


###########
# Query   #
###########

# Return `S_OK` immediately on `GetData(D3DGETDATA_FLUSH)` for a
# `Pending` occlusion query instead of kernel-blocking on
# `MTLCommandBuffer::waitUntilCompleted`.
#
# D3D9-era games use the FLUSH-poll loop as a poor-man's GPU fence
# to compensate for 2004-era drivers that lacked resource hazard
# tracking. Metal tracks hazards explicitly between command
# buffers, so the fence does no correctness work â€” it just throttles
# our API thread (the project's bottleneck) while the GPU (which
# has headroom) is given time it doesn't need. Returning `S_OK`
# immediately lets the game proceed; the actual visibility count
# finalizes naturally on the next `begin_frame` intake if it is
# ever read via the non-FLUSH path (e.g. sun/moon lens-flare,
# which uses `flags = 0`).
#
# Flip to `false` to restore the spec-correct kernel wait. Worth
# trying if a game appears to read the actual pixel count
# immediately after FLUSH and depends on it being accurate (no
# tested game does this in practice).
#
# Default: true
# Supported values: true, false

# query.flushImmediate = true


###########
# Memory  #
###########

# Cap on live VB/IB retained-PageBox memory (MiB).
#
# A non-DYNAMIC partial Lock of an in-flight vertex/index buffer is
# renamed to a fresh backing and the old one retained until the GPU
# stops reading it. During a camera turn the game repacks hundreds of
# buffers per frame; if the GPU falls behind, the retention queue can
# balloon (observed ~1.4 GB) and thrash the 32-bit game process. This
# caps live retained bytes: at the limit the Lock path drains retired
# backings and, if still over, forces a mid-frame GPU-sync before
# allocating â€” trading a bounded, predictable stall for the unbounded
# memory growth + OOM risk.
#
# Lower it if you still see memory-pressure stalls; raise it if turns
# stall on the GPU-sync more than the memory pressure warrants. `0`
# disables the cap.
#
# Default: 512
# Supported values: non-negative integer (MiB; 0 = disabled)

# memory.vbibRetentionCapMB = 512


################
# Presentation #
################

# Frame-rate ceiling (Hz).
#
# Caps how often mtld3d presents, independent of the game's vsync
# request. Useful to trade frame rate for battery/thermals, or to
# bound a free-running (vsync-off) game without re-enabling vsync.
# When both this cap and vsync are active, the lower rate wins:
# `present.maxFps = 60` on a 120 Hz panel gives 60 fps with vsync on.
# Values above the panel's refresh rate have no extra effect while
# vsync is on (the panel ceiling still applies). `0` disables the cap.
#
# Default: 0 (uncapped)
# Supported values: non-negative integer (Hz; 0 = uncapped)

# present.maxFps = 0


#####################
# Debug diagnostics #
#####################

# Expand capability bits to the spec maximum.
#
# OR-in every `D3DCAPS9_*_ALL` mask so the game requests every feature
# it knows about, surfacing unimplemented paths via `log_once_warn!`
# under `RUST_LOG=mtld3d=warn`. Visual rendering may degrade because
# unimplemented features fall back to stubs â€” this is for log-side
# discovery, not pixels. Pair with `RUST_LOG=mtld3d::d3d9::state=trace`
# to enumerate every RS/TSS/SAMP write the game makes.
#
# Default: false
# Supported values: true, false

# debug.capsAll = false

# Directory to dump raw DXSO bytecode into.
#
# When non-empty, the first time each shader is compiled mtld3d writes
# `<dir>/{vs,ps}_<hash>.dxso` containing the raw little-endian `u32`
# token stream. The directory is created on first use. Subsequent
# sights of the same shader id are no-ops. Use with the offline
# disassembler in the source tree (`cd windows && cargo run --example
# disasm --target aarch64-apple-darwin -- <dir>/ps_<hash>.dxso`) to
# inspect the bytecode + emitted MSL without re-running the game. The hash
# matches the value the per-pass debug log prints as `VS prog 0xN` /
# `PS prog 0xN`.
#
# Default: "" (disabled)
# Supported values: any directory path; empty disables

# debug.bytecodeDumpDir = ""

# Shader-identity bisection probe â€” drop draws whose VS or PS matches.
#
# Comma-separated list of `pair_id().hash` u64s in hex (with or
# without the `0x` prefix). Any draw whose VS hash *or* PS hash
# appears in the list is dropped on the encoder thread before
# Metal encoding. Stable across frames (unlike index-based skip),
# so this is the right tool when draw counts vary frame-to-frame.
# Get the hashes from the per-pass debug log lines
# (`RUST_LOG=mtld3d::d3d9=debug`).
#
# Default: "" (no draws skipped)
# Supported values: comma-separated hex u64s, e.g. "0xabc, 0xdef"

# debug.skipShaders = ""
